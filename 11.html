    <script>
    
      function drawRotatedRectangle(ctx, x, y, width, height, angleInDegrees, fillColor) {
        // 将度数转换为弧度
            const angleInRadians = angleInDegrees * (Math.PI / 180);

            // 保存当前绘图状态
            ctx.save();

            // 移动到矩形的顶点
            ctx.translate(x, y);

            // 旋转指定角度
            ctx.rotate(angleInRadians);

            // 设置矩形的描边颜色
            ctx.strokeStyle = '#808080';

            // 设置矩形的填充颜色
            ctx.fillStyle = fillColor || 'rgba(0, 0, 0, 0.7)'; // 默认为透明，如果不提供填充颜色

            // 设置描边的宽度
            ctx.lineWidth = 1;

            // 设置线端样式
            ctx.lineCap = 'square';

            
            // 绘制矩形
            ctx.fillRect(0, 0, width, height);

            // 绘制矩形的边框
            ctx.strokeRect(0, 0, width, height);

            // 恢复之前的绘图状态
            ctx.restore();

        }

        function drawImageOnCanvas(ctximg,imageUrl, x, y, width = null, height = null) {
            sx=x+243;
            sy=y+151;
            var sh=25;
            var sw=75;
            var bl=Math.floor((1/Math.sqrt(2))*(sh+2));
             // 创建一个新的图片对象
            const img = new Image();
            img.src = imageUrl;

            // 当图片加载完成后，绘制到 Canvas 上
            img.onload = function() {
                // 如果 width 和 height 都没有提供，使用图片的原始尺寸
                if (width === null && height === null) {
                    width = img.width;
                    height = img.height;
                }
                // 如果只提供了 height，根据原图比例计算 width
                else if (width === null) {
                    width = img.width * (height / img.height);
                }
                // 如果只提供了 width，根据原图比例计算 height
                else if (height === null) {
                    height = img.height * (width / img.width);
                }

                // 绘制图片到 Canvas 上
                ctximg.drawImage(img, x, y, width, height);

                drawRotatedRectangle(ctximg, sx, sy, sw, sh, 0,'green');
                drawRotatedRectangle(ctximg, sx, sy+sh, sw, sh, 45,'green');
                drawRotatedRectangle(cxt, sx-bl, sy+sh+bl, sw, sh, 90,'green');
                drawRotatedRectangle(cxt, sx-bl-sh, sy+sh+bl, sw, sh, 135,'white');
                drawRotatedRectangle(cxt, sx-sh-2*bl, sy+sh, sw, sh, 180,'green');
                drawRotatedRectangle(cxt, sx-sh-2*bl, sy, sw, sh, 225,'green');
                drawRotatedRectangle(cxt, sx-sh-bl, sy-bl, sw, sh, 270,'green');
                drawRotatedRectangle(cxt, sx-bl, sy-bl, sw, sh, 315,'green');
            };

            // 处理图片加载错误
            img.onerror = function() {
                console.error('Failed to load image:', imageUrl);
            };
        }
